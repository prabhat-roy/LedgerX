apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata: { name: ledgerx-success-rate, namespace: ledgerx }
spec:
  args:
    - { name: service-name }
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.995
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}", code!~"5.."}[1m]))
              / sum(rate(http_requests_total{service="{{args.service-name}}"}[1m]))
    - name: p99-latency-ms
      interval: 30s
      successCondition: result[0] <= 200
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99, sum by (le) (rate(http_request_duration_ms_bucket{service="{{args.service-name}}"}[1m])))
