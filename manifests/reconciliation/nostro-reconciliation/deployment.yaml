apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostro-reconciliation
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: nostro-reconciliation
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: reconciliation
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: nostro-reconciliation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: nostro-reconciliation, ledgerx.io/domain: reconciliation }
    spec:
      serviceAccountName: nostro-reconciliation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: nostro-reconciliation
          image: harbor.ledgerx.internal/ledgerx/nostro-reconciliation:latest
          ports: [{ containerPort: 50322, name: http }]
          envFrom: [{ configMapRef: { name: nostro-reconciliation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
