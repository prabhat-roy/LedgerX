apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: card-issuance, namespace: cards-cde }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: card-issuance }
  minReplicas: 3
  maxReplicas: 12
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
