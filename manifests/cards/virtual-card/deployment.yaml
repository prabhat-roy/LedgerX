apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-card
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: virtual-card
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: cards
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: virtual-card } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: virtual-card, ledgerx.io/domain: cards }
    spec:
      serviceAccountName: virtual-card
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: virtual-card
          image: harbor.ledgerx.internal/ledgerx/virtual-card:latest
          ports: [{ containerPort: 50083, name: http }]
          envFrom: [{ configMapRef: { name: virtual-card } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
