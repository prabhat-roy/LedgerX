apiVersion: apps/v1
kind: Deployment
metadata:
  name: collections-service
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: collections-service
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: lending
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: collections-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: collections-service, ledgerx.io/domain: lending }
    spec:
      serviceAccountName: collections-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: collections-service
          image: harbor.ledgerx.internal/ledgerx/collections-service:latest
          ports: [{ containerPort: 50104, name: http }]
          envFrom: [{ configMapRef: { name: collections-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50104 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50104 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
