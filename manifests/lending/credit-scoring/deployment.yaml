apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-scoring
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: credit-scoring
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: lending
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: credit-scoring } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: credit-scoring, ledgerx.io/domain: lending }
    spec:
      serviceAccountName: credit-scoring
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: credit-scoring
          image: harbor.ledgerx.internal/ledgerx/credit-scoring:latest
          ports: [{ containerPort: 50102, name: http }]
          envFrom: [{ configMapRef: { name: credit-scoring } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
