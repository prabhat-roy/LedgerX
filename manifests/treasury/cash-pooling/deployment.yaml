apiVersion: apps/v1
kind: Deployment
metadata:
  name: cash-pooling
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: cash-pooling
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: treasury
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cash-pooling } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cash-pooling, ledgerx.io/domain: treasury }
    spec:
      serviceAccountName: cash-pooling
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cash-pooling
          image: harbor.ledgerx.internal/ledgerx/cash-pooling:latest
          ports: [{ containerPort: 50202, name: http }]
          envFrom: [{ configMapRef: { name: cash-pooling } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
