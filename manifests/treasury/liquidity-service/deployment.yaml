apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquidity-service
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: liquidity-service
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: treasury
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: liquidity-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: liquidity-service, ledgerx.io/domain: treasury }
    spec:
      serviceAccountName: liquidity-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: liquidity-service
          image: harbor.ledgerx.internal/ledgerx/liquidity-service:latest
          ports: [{ containerPort: 50201, name: http }]
          envFrom: [{ configMapRef: { name: liquidity-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
