apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-alert
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: sms-alert
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: notifications
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: sms-alert } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sms-alert, ledgerx.io/domain: notifications }
    spec:
      serviceAccountName: sms-alert
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: sms-alert
          image: harbor.ledgerx.internal/ledgerx/sms-alert:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: sms-alert } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
