apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: notifications
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: orchestrator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: orchestrator, ledgerx.io/domain: notifications }
    spec:
      serviceAccountName: orchestrator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: orchestrator
          image: harbor.ledgerx.internal/ledgerx/orchestrator:latest
          ports: [{ containerPort: 50260, name: http }]
          envFrom: [{ configMapRef: { name: orchestrator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
