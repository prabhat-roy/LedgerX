apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-prediction
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: churn-prediction
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: churn-prediction } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: churn-prediction, ledgerx.io/domain: analytics }
    spec:
      serviceAccountName: churn-prediction
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: churn-prediction
          image: harbor.ledgerx.internal/ledgerx/churn-prediction:latest
          ports: [{ containerPort: 50301, name: http }]
          envFrom: [{ configMapRef: { name: churn-prediction } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
