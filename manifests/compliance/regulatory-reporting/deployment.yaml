apiVersion: apps/v1
kind: Deployment
metadata:
  name: regulatory-reporting
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: regulatory-reporting
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: regulatory-reporting } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: regulatory-reporting, ledgerx.io/domain: compliance }
    spec:
      serviceAccountName: regulatory-reporting
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: regulatory-reporting
          image: harbor.ledgerx.internal/ledgerx/regulatory-reporting:latest
          ports: [{ containerPort: 50223, name: http }]
          envFrom: [{ configMapRef: { name: regulatory-reporting } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
