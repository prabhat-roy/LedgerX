apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ledger-service, namespace: ledgerx }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ledger-service }
  minReplicas: 6
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
