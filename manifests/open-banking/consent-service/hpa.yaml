apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: consent-service, namespace: ledgerx }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: consent-service }
  minReplicas: 3
  maxReplicas: 15
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
