apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: ledgerx, labels: { app: api-gateway, ledgerx.io/domain: platform } }
spec:
  replicas: 6
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      serviceAccountName: api-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: api-gateway
          image: harbor.ledgerx.internal/ledgerx/api-gateway:0.1.0
          ports: [{ name: http, containerPort: 60000 }]
          env: [{ name: PORT, value: "60000" }, { name: LOG_LEVEL, value: info }]
          livenessProbe: { httpGet: { path: /healthz, port: 60000 }, initialDelaySeconds: 15, periodSeconds: 20 }
          readinessProbe: { httpGet: { path: /healthz, port: 60000 }, initialDelaySeconds: 5 }
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 2, memory: 1Gi } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
