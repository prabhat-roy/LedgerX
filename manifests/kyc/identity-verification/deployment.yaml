apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-verification
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: identity-verification
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: kyc
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: identity-verification } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: identity-verification, ledgerx.io/domain: kyc }
    spec:
      serviceAccountName: identity-verification
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: identity-verification
          image: harbor.ledgerx.internal/ledgerx/identity-verification:latest
          ports: [{ containerPort: 50120, name: http }]
          envFrom: [{ configMapRef: { name: identity-verification } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
