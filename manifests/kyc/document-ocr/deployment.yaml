apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-ocr
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: document-ocr
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: kyc
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: document-ocr } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: document-ocr, ledgerx.io/domain: kyc }
    spec:
      serviceAccountName: document-ocr
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: document-ocr
          image: harbor.ledgerx.internal/ledgerx/document-ocr:latest
          ports: [{ containerPort: 50122, name: http }]
          envFrom: [{ configMapRef: { name: document-ocr } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
