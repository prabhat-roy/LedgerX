apiVersion: apps/v1
kind: Deployment
metadata:
  name: robo-advisor
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: robo-advisor
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: wealth
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: robo-advisor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: robo-advisor, ledgerx.io/domain: wealth }
    spec:
      serviceAccountName: robo-advisor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: robo-advisor
          image: harbor.ledgerx.internal/ledgerx/robo-advisor:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: robo-advisor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
