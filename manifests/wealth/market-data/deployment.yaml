apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: market-data
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: wealth
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: market-data } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: market-data, ledgerx.io/domain: wealth }
    spec:
      serviceAccountName: market-data
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: market-data
          image: harbor.ledgerx.internal/ledgerx/market-data:latest
          ports: [{ containerPort: 50163, name: http }]
          envFrom: [{ configMapRef: { name: market-data } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
