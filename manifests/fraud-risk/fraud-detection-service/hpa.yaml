apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: fraud-detection-service, namespace: ledgerx }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: fraud-detection-service }
  minReplicas: 8
  maxReplicas: 50
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } } }]
