apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-management
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: case-management
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: fraud-risk
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: case-management } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: case-management, ledgerx.io/domain: fraud-risk }
    spec:
      serviceAccountName: case-management
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: case-management
          image: harbor.ledgerx.internal/ledgerx/case-management:latest
          ports: [{ containerPort: 50142, name: http }]
          envFrom: [{ configMapRef: { name: case-management } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
