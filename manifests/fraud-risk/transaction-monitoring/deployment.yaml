apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-monitoring
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: transaction-monitoring
    app.kubernetes.io/part-of: ledgerx
    ledgerx.io/domain: fraud-risk
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: transaction-monitoring } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: transaction-monitoring, ledgerx.io/domain: fraud-risk }
    spec:
      serviceAccountName: transaction-monitoring
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: transaction-monitoring
          image: harbor.ledgerx.internal/ledgerx/transaction-monitoring:latest
          ports: [{ containerPort: 50140, name: http }]
          envFrom: [{ configMapRef: { name: transaction-monitoring } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50140 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50140 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
