apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: ledgerx-internal-ca }
spec:
  ca: { secretName: ledgerx-root-ca }
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: letsencrypt-prod }
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: security@ledgerx.com
    privateKeySecretRef: { name: letsencrypt-prod-key }
    solvers: [{ http01: { ingress: { class: alb } } }]
