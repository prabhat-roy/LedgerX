apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata: { name: ledgerx-signed-images }
spec:
  images: [{ glob: "harbor.ledgerx.internal/ledgerx/**" }]
  authorities:
    - keyless:
        url: https://fulcio.sigstore.dev
        identities:
          - { issuer: https://token.actions.githubusercontent.com, subject: "https://github.com/prabhat-roy/LedgerX/.github/workflows/deploy.yml@refs/heads/main" }
      ctlog: { url: https://rekor.sigstore.dev }
    - key:
        secretRef: { name: cosign-pub, namespace: security }
