# Coraza WAF rules in front of api-gateway and ob-gateway.
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecAuditEngine RelevantOnly
SecAuditLog /var/log/coraza/audit.log

# Reject obvious card numbers in URL or body (defence in depth — primary tokenisation
# happens at the SDK layer, this catches developer mistakes).
SecRule REQUEST_URI|REQUEST_BODY "@rx [0-9]{13,19}" \
  "id:1000,phase:2,deny,status:403,msg:'Possible PAN in request',severity:CRITICAL,tag:pci-dss"

# OWASP Core Rule Set inclusion.
Include @owasp_crs/*.conf

# FAPI 2.0 enforcement on /open-banking/* — require DPoP and JWS detached signature.
SecRule REQUEST_URI "@beginsWith /open-banking/" \
  "id:2000,phase:1,chain,pass"
  SecRule REQUEST_HEADERS:DPoP "@rx ^$" "deny,status:401,msg:'Missing DPoP header (FAPI 2.0)'"
