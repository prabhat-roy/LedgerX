apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata: { name: ledgerx-slsa-l3 }
spec:
  images: [{ glob: harbor.ledgerx.internal/ledgerx/* }]
  authorities:
    - name: slsa-provenance
      keyless:
        url: https://fulcio.sigstore.dev
      attestations:
        - { name: slsa-l3, predicateType: https://slsa.dev/provenance/v1 }
