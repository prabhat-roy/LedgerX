name: Deploy
on:
  push:
    branches: [main]
    paths: [src/**]

permissions:
  contents: write
  packages: write
  id-token: write   # for OIDC keyless cosign

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, ledger-service, payment-router, fraud-detection-service, consent-service, auth-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: harbor.ledgerx.internal, username: ${{ secrets.HARBOR_USER }}, password: ${{ secrets.HARBOR_PASS }} }
      - uses: docker/build-push-action@v5
        with:
          context: src/${{ matrix.service }}
          push: true
          tags: |
            harbor.ledgerx.internal/ledgerx/${{ matrix.service }}:${{ github.sha }}
            harbor.ledgerx.internal/ledgerx/${{ matrix.service }}:latest
      - uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes harbor.ledgerx.internal/ledgerx/${{ matrix.service }}:${{ github.sha }}
          syft harbor.ledgerx.internal/ledgerx/${{ matrix.service }}:${{ github.sha }} -o spdx-json > sbom.json
          cosign attest --yes --predicate sbom.json --type spdx harbor.ledgerx.internal/ledgerx/${{ matrix.service }}:${{ github.sha }}
      - name: Bump image tag in GitOps repo
        run: scripts/argocd-bump-image.sh ${{ matrix.service }} ${{ github.sha }} staging aws
