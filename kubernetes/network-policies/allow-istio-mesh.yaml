apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-istio-mesh, namespace: ledgerx }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ledgerx } }
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ledgerx } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ledgerx-data } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: messaging } }
    - ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]   # DNS
