ledgerx:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres.ledgerx.svc
      user: dbt
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: 5432
      dbname: ledgerx_warehouse
      schema: public
      threads: 8
    prod:
      type: trino
      host: trino.ledgerx.svc
      port: 8080
      catalog: iceberg
      schema: ledgerx_mart
      threads: 16
