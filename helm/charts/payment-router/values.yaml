image: { repository: ledgerx/payment-router, tag: "", pullPolicy: IfNotPresent }
replicaCount: 6
service: { type: ClusterIP, port: 60041, targetPort: 60041 }
resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits: { cpu: 2, memory: 2Gi }
probes:
  liveness: { httpGet: { path: /healthz, port: 60041 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 60041 }, initialDelaySeconds: 5, periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels:
  app.kubernetes.io/name: payment-router
  app.kubernetes.io/part-of: ledgerx
  ledgerx.io/domain: payments
  ledgerx.io/money-moving: "true"
  ledgerx.io/two-person-rule: "true"
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info, KAFKA_BROKERS: "kafka.messaging.svc.cluster.local:9092" }
cloud: { provider: "", storageClass: "", ingressClass: "" }
