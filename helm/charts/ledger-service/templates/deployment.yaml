apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ledger-service.fullname" . }}
  labels: {{- include "ledger-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "ledger-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ledger-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{- toYaml . | nindent 8 }}{{- end }}
      annotations:
        {{- with .Values.podAnnotations }}{{- toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "ledger-service.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "ledger-service.selectorLabels" . | nindent 14 }}
      containers:
        - name: ledger-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.service.targetPort }}, protocol: TCP }
          env:
            - { name: PORT, value: "{{ .Values.service.targetPort }}" }
            {{- range $k, $v := .Values.config }}
            - { name: {{ $k }}, value: "{{ $v }}" }
            {{- end }}
            {{- with .Values.env }}{{- toYaml . | nindent 12 }}{{- end }}
          {{- with .Values.envFrom }}
          envFrom: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe: {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe: {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
