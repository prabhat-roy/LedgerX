cloud:
  provider: azure
  storageClass: managed-csi
  regions: [eastus, westeurope, centralindia]
  multiRegion: active-active
serviceAccount:
  annotations:
    azure.workload.identity/client-id: "{{ .Values.azure.clientId }}"
podLabels:
  azure.workload.identity/use: "true"
envFrom:
  - secretRef: { name: ledger-service-azure-secrets }
