image:
  repository: ledgerx/graphql-gateway
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 60005
  targetPort: 60005

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1000m, memory: 512Mi }

probes:
  liveness:
    httpGet: { path: /healthz, port: 60005 }
    initialDelaySeconds: 15
  readiness:
    httpGet: { path: /healthz, port: 60005 }
    initialDelaySeconds: 5

serviceAccount: { create: true, annotations: {} }

podLabels:
  app.kubernetes.io/name: graphql-gateway
  app.kubernetes.io/part-of: ledgerx
  ledgerx.io/domain: platform

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile: { type: RuntimeDefault }

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }

config:
  LOG_LEVEL: info

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
