image: { repository: ledgerx/bff-retail, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 60001, targetPort: 60001 }
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 1000m, memory: 512Mi }
probes:
  liveness: { httpGet: { path: /healthz, port: 60001 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 60001 }, initialDelaySeconds: 5, periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels:
  app.kubernetes.io/name: bff-retail
  app.kubernetes.io/part-of: ledgerx
  ledgerx.io/domain: platform
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "", storageClass: "", ingressClass: "" }
