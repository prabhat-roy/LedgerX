image: { repository: ledgerx/saga-orchestrator, tag: "", pullPolicy: IfNotPresent }
replicaCount: 4
service: { type: ClusterIP, port: 60008, targetPort: 60008 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 2, memory: 1Gi } }
probes:
  liveness: { httpGet: { path: /healthz, port: 60008 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 60008 }, initialDelaySeconds: 5, periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: saga-orchestrator, app.kubernetes.io/part-of: ledgerx, ledgerx.io/domain: platform, ledgerx.io/money-moving: "true" }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info, KAFKA_BROKERS: "kafka.messaging.svc.cluster.local:9092", TEMPORAL_ADDR: "temporal.workflow.svc.cluster.local:7233" }
cloud: { provider: "" }
