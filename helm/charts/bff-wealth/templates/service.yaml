apiVersion: v1
kind: Service
metadata: { name: {{ include "svc.fullname" . }}, labels: {{- include "svc.labels" . | nindent 4 }} }
spec:
  type: {{ .Values.service.type }}
  ports: [ { port: {{ .Values.service.port }}, targetPort: http, name: http } ]
  selector: {{- include "svc.selectorLabels" . | nindent 4 }}
