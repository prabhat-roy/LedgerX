syntax = "proto3";

package ledgerx.kyc.v1;

import "common/types.proto";
import "common/health.proto";

option java_package = "com.ledgerx.kyc.v1";
option java_multiple_files = true;

// screening-service: PEP / sanctions screening (OFAC/UN/EU).
service ScreeningService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc Screen(ScreenRequest) returns (ScreenResult);
}

message ScreenRequest {
  string full_name = 1;
  string country_code = 2;
  string date_of_birth = 3;      // ISO-8601
}
message ScreenResult {
  bool match = 1;
  string list_name = 2;          // OFAC_SDN, UN_CONSOLIDATED, EU_FSF
  double match_score = 3;
}
