syntax = "proto3";

package ledgerx.kyc.v1;

import "common/health.proto";

option java_package = "com.ledgerx.kyc.v1";
option java_multiple_files = true;

// aml-service: AML rule + ML scoring (Python).
service AmlService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
