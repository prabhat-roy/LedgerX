syntax = "proto3";

package ledgerx.notifications.v1;

import "common/types.proto";
import "common/health.proto";

option java_package = "com.ledgerx.notifications.v1";
option java_multiple_files = true;

// notification-orchestrator: multi-channel orchestrator + templates (Node).
service NotificationOrchestrator {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc Send(SendRequest) returns (SendResponse);
}

message SendRequest {
  ledgerx.common.v1.CustomerRef customer = 1;
  string template_id = 2;
  map<string, string> variables = 3;
  repeated string channels = 4;  // SMS, EMAIL, PUSH, INAPP
  string priority = 5;
}
message SendResponse {
  string dispatch_id = 1;
  repeated string queued_channels = 2;
}
