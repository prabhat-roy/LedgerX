syntax = "proto3";

package ledgerx.openbanking.v1;

import "common/health.proto";

option java_package = "com.ledgerx.openbanking.v1";
option java_multiple_files = true;

// fapi-token-service: FAPI 2.0 token endpoint.
service FapiTokenService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
