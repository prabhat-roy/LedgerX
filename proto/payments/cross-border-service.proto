syntax = "proto3";

package ledgerx.payments.v1;

import "common/health.proto";

option java_package = "com.ledgerx.payments.v1";
option java_multiple_files = true;

// cross-border-service: cross-border FX-leg coordination.
service CrossBorderService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
