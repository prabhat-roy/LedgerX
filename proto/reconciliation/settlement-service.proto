syntax = "proto3";

package ledgerx.reconciliation.v1;

import "common/health.proto";

option java_package = "com.ledgerx.reconciliation.v1";
option java_multiple_files = true;

// settlement-service: settlement calculation + posting.
service SettlementService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
