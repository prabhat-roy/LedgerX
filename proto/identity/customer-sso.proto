syntax = "proto3";

package ledgerx.identity.v1;

import "common/health.proto";

option java_package = "com.ledgerx.identity.v1";
option java_multiple_files = true;

// customer-sso: customer SSO (OIDC).
service CustomerSsoService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
