syntax = "proto3";

package ledgerx.identity.v1;

import "common/types.proto";
import "common/health.proto";

option java_package = "com.ledgerx.identity.v1";
option java_multiple_files = true;

// auth-service: FIDO2/WebAuthn auth + OAuth2 issuer (Rust).
service AuthService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
}

message AuthenticateRequest {
  string username = 1;
  string credential = 2;         // OAuth code, WebAuthn attestation
  string client_id = 3;
  string device_id = 4;
}
message AuthenticateResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
}
