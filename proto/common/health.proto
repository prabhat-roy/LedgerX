syntax = "proto3";

package ledgerx.common.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.ledgerx.common.v1";
option java_multiple_files = true;

// Standard health-check messages re-used across every LedgerX service.
message HealthRequest {}

message HealthResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    DEGRADED = 3;
  }
  Status status = 1;
  string version = 2;
  string git_sha = 3;
  google.protobuf.Timestamp checked_at = 4;
  map<string, string> dependencies = 5;  // db=ok, kafka=ok, vault=degraded
}

service HealthService {
  rpc Check(HealthRequest) returns (HealthResponse);
}
