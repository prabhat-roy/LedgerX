syntax = "proto3";

package ledgerx.insurance.v1;

import "common/health.proto";

option java_package = "com.ledgerx.insurance.v1";
option java_multiple_files = true;

// claims-service: claims management workflow.
service ClaimsService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
