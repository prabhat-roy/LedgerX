syntax = "proto3";

package ledgerx.compliance.v1;

import "common/health.proto";

option java_package = "com.ledgerx.compliance.v1";
option java_multiple_files = true;

// regulatory-reporting: BASEL III, COREP/FINREP regulatory reporting.
service RegulatoryReportingService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
