syntax = "proto3";

package ledgerx.fraudrisk.v1;

import "common/health.proto";

option java_package = "com.ledgerx.fraudrisk.v1";
option java_multiple_files = true;

// aml-graph-service: AML graph (Neo4j + GNN).
service AmlGraphService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
