syntax = "proto3";

package ledgerx.wealth.v1;

import "common/health.proto";

option java_package = "com.ledgerx.wealth.v1";
option java_multiple_files = true;

// pricing-engine: pure pricing/yield engine (bond/option math) — Haskell.
service PricingEngine {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
