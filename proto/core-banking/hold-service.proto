syntax = "proto3";

package ledgerx.corebanking.v1;

import "common/health.proto";

option java_package = "com.ledgerx.corebanking.v1";
option java_multiple_files = true;

// hold-service: hold/lien management on accounts.
service HoldService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
