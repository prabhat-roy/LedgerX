syntax = "proto3";

package ledgerx.corebanking.v1;

import "common/types.proto";
import "common/health.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.ledgerx.corebanking.v1";
option java_multiple_files = true;

// balance-service: real-time balance projections from ledger events.
// Read-side projection — no direct writes; balances replay from EventStoreDB.
service BalanceService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc GetBalance(GetBalanceRequest) returns (Balance);
  rpc GetAvailableBalance(GetBalanceRequest) returns (Balance);  // less holds
}

message Balance {
  string account_id = 1;
  ledgerx.common.v1.Money posted = 2;
  ledgerx.common.v1.Money available = 3;
  ledgerx.common.v1.Money holds = 4;
  int64 ledger_sequence = 5;
  google.protobuf.Timestamp as_of = 6;
}

message GetBalanceRequest { string account_id = 1; }
