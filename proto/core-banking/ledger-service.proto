syntax = "proto3";

package ledgerx.corebanking.v1;

import "common/types.proto";
import "common/health.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.ledgerx.corebanking.v1";
option java_multiple_files = true;

// ledger-service: append-only double-entry ledger.
// Backed by EventStoreDB (event sourcing) and projected to CockroachDB.
// NEVER UPDATE/DELETE on the journal. Reversals post a new compensating entry.
service LedgerService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  // PostJournal appends a balanced (debits == credits) journal entry.
  // Two-person rule applies — `audit.approver_id` MUST be set or OPA rejects.
  rpc PostJournal(PostJournalRequest) returns (PostJournalResponse);
  rpc GetJournal(GetJournalRequest) returns (JournalEntry);
  rpc StreamJournal(StreamJournalRequest) returns (stream JournalEntry);
}

message JournalEntry {
  string journal_id = 1;
  int64 sequence = 2;            // monotonic per ledger
  string description = 3;
  repeated JournalLine lines = 4;
  google.protobuf.Timestamp posted_at = 5;
  ledgerx.common.v1.AuditMetadata audit = 6;
  ledgerx.common.v1.IdempotencyKey idempotency_key = 7;
  string reversal_of_journal_id = 8;  // if this is a compensating reversal
}

message JournalLine {
  string account_id = 1;
  enum Side { DEBIT = 0; CREDIT = 1; }
  Side side = 2;
  ledgerx.common.v1.Money amount = 3;
  string memo = 4;
}

message PostJournalRequest { JournalEntry entry = 1; }
message PostJournalResponse {
  string journal_id = 1;
  int64 sequence = 2;
  google.protobuf.Timestamp posted_at = 3;
}

message GetJournalRequest { string journal_id = 1; }
message StreamJournalRequest {
  int64 from_sequence = 1;
  string account_id = 2;         // optional filter
}
