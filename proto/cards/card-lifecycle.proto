syntax = "proto3";

package ledgerx.cards.v1;

import "common/health.proto";

option java_package = "com.ledgerx.cards.v1";
option java_multiple_files = true;

// card-lifecycle: block / replace / PIN change.
service CardLifecycleService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
