syntax = "proto3";

package ledgerx.cards.v1;

import "common/types.proto";
import "common/health.proto";

option java_package = "com.ledgerx.cards.v1";
option java_multiple_files = true;

// tokenisation-service: PAN tokenisation vault (HSM-adjacent).
// Reverse lookup is gated by Vault policy `card-data-tokenisation`.
service TokenisationService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc Tokenise(TokeniseRequest) returns (TokeniseResponse);
  rpc Detokenise(DetokeniseRequest) returns (DetokeniseResponse);
}

message TokeniseRequest {
  string pan = 1;                // ONLY accepted at PCI-DSS edge
  string requestor = 2;
}
message TokeniseResponse {
  ledgerx.common.v1.CardRef card = 1;
}

message DetokeniseRequest {
  string token = 1;
  string requestor = 2;
  string purpose = 3;
}
message DetokeniseResponse {
  string pan = 1;                // returned only inside the CDE
}
