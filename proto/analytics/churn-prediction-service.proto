syntax = "proto3";

package ledgerx.analytics.v1;

import "common/types.proto";
import "common/health.proto";

option java_package = "com.ledgerx.analytics.v1";
option java_multiple_files = true;

// churn-prediction-service: churn prediction (lifelines survival).
service ChurnPredictionService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc Predict(PredictRequest) returns (PredictResponse);
}

message PredictRequest { ledgerx.common.v1.CustomerRef customer = 1; }
message PredictResponse {
  double churn_probability = 1;
  int32 horizon_days = 2;
  string model_version = 3;
}
