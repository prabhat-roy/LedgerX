syntax = "proto3";

package ledgerx.platform.v1;

import "common/health.proto";

option java_package = "com.ledgerx.platform.v1";
option java_multiple_files = true;

// rate-limiter: distributed rate limiter (Redis Cell algorithm).
service RateLimiterService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc CheckQuota(CheckQuotaRequest) returns (CheckQuotaResponse);
}

message CheckQuotaRequest {
  string subject = 1;            // user_id, tpp_id, ip
  string scope = 2;              // route, action
  int32 cost = 3;                // tokens to consume
}

message CheckQuotaResponse {
  bool allowed = 1;
  int32 remaining = 2;
  int32 retry_after_ms = 3;
}
