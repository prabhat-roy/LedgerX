syntax = "proto3";

package ledgerx.platform.v1;

import "common/types.proto";
import "common/health.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.ledgerx.platform.v1";
option java_multiple_files = true;

// saga-orchestrator: cross-service money-movement saga orchestrator.
// Replaces 2PC; compensating actions per step.
service SagaOrchestratorService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);

  rpc StartSaga(StartSagaRequest) returns (StartSagaResponse);
  rpc GetSagaStatus(GetSagaStatusRequest) returns (GetSagaStatusResponse);
}

message StartSagaRequest {
  string saga_type = 1;          // e.g. CROSS_BORDER_TRANSFER
  ledgerx.common.v1.IdempotencyKey idempotency_key = 2;
  ledgerx.common.v1.AuditMetadata audit = 3;
  bytes payload = 4;             // domain-specific payload
}

message StartSagaResponse {
  string saga_id = 1;
}

message GetSagaStatusRequest { string saga_id = 1; }
message GetSagaStatusResponse {
  string saga_id = 1;
  enum State { PENDING = 0; RUNNING = 1; COMPLETED = 2; FAILED = 3; COMPENSATED = 4; }
  State state = 2;
  google.protobuf.Timestamp updated_at = 3;
  repeated string completed_steps = 4;
}
