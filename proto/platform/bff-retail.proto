syntax = "proto3";

package ledgerx.platform.v1;

import "common/health.proto";

option java_package = "com.ledgerx.platform.v1";
option java_multiple_files = true;

// bff-retail: BFF for retail customer mobile/web (React + Flutter).
service BffRetailService {
  rpc Health(ledgerx.common.v1.HealthRequest) returns (ledgerx.common.v1.HealthResponse);
}
