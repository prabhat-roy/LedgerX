name:                financial-rules-engine
version:             0.1.0
synopsis:            Pure financial rules engine (interest accrual, IFRS 17 cashflow)
license:             AllRightsReserved
build-type:          Simple

dependencies:
  - base >= 4.14 && < 5
  - aeson
  - scotty
  - warp
  - text
  - bytestring
  - Decimal

executables:
  financial-rules-engine:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
